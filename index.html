<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    >

    <meta name="theme-color" content="#07090f">
    <meta
        name="description"
        content="Robot Academy 智慧機器人學習平台"
    >

    <title>Robot Academy</title>

    <script>
        (function () {
            try {
                const savedTheme = localStorage.getItem("robotAcademyTheme");
                const theme = savedTheme === "light" ? "light" : "dark";

                document.documentElement.dataset.theme = theme;
            } catch (error) {
                document.documentElement.dataset.theme = "dark";
            }
        })();
    </script>

    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/pages.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <div id="app" class="app-layout">
        
        <section id="auth-screen" class="academy-auth" aria-label="帳號登入">
            
            <div class="academy-auth__brand">
                <div class="academy-auth__brand-inner">
                    
                    <svg class="academy-auth__robot" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 3.5h8M12 3.5V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <rect x="4" y="7" width="16" height="12" rx="4" stroke="currentColor" stroke-width="1.8"/>
                        <circle cx="9" cy="12.5" r="1.2" fill="currentColor"/>
                        <circle cx="15" cy="12.5" r="1.2" fill="currentColor"/>
                        <path d="M9 16h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>

                    <div class="academy-auth__brand-copy">
                        <p class="academy-auth__eyebrow">AI Learning System</p>
                        <h2>建立知識，<br><span>升級你的能力。</span></h2>
                        <p class="academy-auth__description">透過個人化題庫、間隔複習與能力分析，建立更有效率、更有節奏的學習體驗。</p>
                    </div>

                    <div class="academy-auth__features" aria-label="平台特色">
                        <span>智慧題庫</span>
                        <span>錯題複習</span>
                        <span>能力分析</span>
                        <span>學習排行榜</span>
                    </div>
                </div>
            </div>

            <div class="academy-auth__main">
                <div class="academy-auth__card">
                    
                    <header class="academy-auth__header">
                        <p class="academy-auth__card-eyebrow">Robot Academy</p>
                        <h1 id="auth-panel-title">歡迎回來</h1>
                        <p id="auth-panel-description">登入帳號以繼續你的學習進度。</p>
                    </header>

                    <div id="auth-message" class="auth-message" role="status" aria-live="polite"></div>

                    <div class="academy-auth__tabs" role="tablist" aria-label="帳號操作">
                        <button id="login-tab" class="academy-auth__tab active" type="button" role="tab" aria-selected="true" aria-controls="login-form" data-auth-tab="login">登入</button>
                        <button id="register-tab" class="academy-auth__tab" type="button" role="tab" aria-selected="false" aria-controls="register-form" data-auth-tab="register">建立帳號</button>
                    </div>

                    <form id="login-form" class="auth-form active" autocomplete="on" novalidate>
                        <div class="field">
                            <label for="login-email">電子郵件</label>
                            <input id="login-email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="name@example.com" required>
                        </div>
                        <div class="field">
                            <label for="login-password">密碼</label>
                            <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="輸入你的密碼" minlength="6" required>
                        </div>
                        <button class="button button-primary auth-submit" type="submit">登入 Robot Academy</button>
                    </form>

                    <form id="register-form" class="auth-form" autocomplete="on" novalidate hidden>
                        <div class="field">
                            <label for="register-name">顯示名稱</label>
                            <input id="register-name" name="name" type="text" autocomplete="name" placeholder="例如：小明" maxlength="24" required>
                        </div>
                        <div class="field">
                            <label for="register-email">電子郵件</label>
                            <input id="register-email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="name@example.com" required>
                        </div>
                        <div class="field-row">
                            <div class="field">
                                <label for="register-password">密碼</label>
                                <input id="register-password" name="password" type="password" autocomplete="new-password" placeholder="至少 6 個字元" minlength="6" required>
                            </div>
                            <div class="field">
                                <label for="register-confirm-password">確認密碼</label>
                                <input id="register-confirm-password" name="confirmPassword" type="password" autocomplete="new-password" placeholder="再次輸入" minlength="6" required>
                            </div>
                        </div>
                        <button class="button button-primary auth-submit" type="submit">建立學習帳號</button>
                    </form>

                    <p class="academy-auth__notice">
                        此版本使用瀏覽器本機儲存功能保存帳號與學習進度，不會將資料傳送到外部伺服器。
                    </p>

                </div>
            </div>
        </section>

        <div class="mobile-nav" aria-label="主要選單">
            <nav class="mobile-nav__inner">
                <button class="mobile-nav-button" type="button" data-route="dashboard">
                    <span aria-hidden="true">⌂</span>
                    <span>首頁</span>
                </button>
                <button class="mobile-nav-button" type="button" data-route="courses">
                    <span aria-hidden="true">▶</span>
                    <span>課程</span>
                </button>
                <button class="mobile-nav-button" type="button" data-route="leaderboard">
                    <span aria-hidden="true">△</span>
                    <span>排行</span>
                </button>
                <button class="mobile-nav-button" type="button" data-route="profile">
                    <span aria-hidden="true">○</span>
                    <span>帳號</span>
                </button>
            </nav>
        </div>
    </div>

    <div id="modal-root" aria-live="polite"></div>

    <div
        id="toast-root"
        class="toast-root"
        aria-live="polite"
        aria-atomic="true"
    ></div>

    <noscript>
        <div class="noscript-message">
            Robot Academy 需要 JavaScript 才能正常運作，
            請在瀏覽器設定中啟用 JavaScript。
        </div>
    </noscript>

    <script src="./js/data.js" defer></script>
    <script src="./js/app.js" defer></script>
    <script src="./js/dashboard.js" defer></script>
    <script src="./js/course.js" defer></script>
    <script src="./js/lesson.js" defer></script>
    
</body>
</html>
